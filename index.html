<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 7: IP Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050b14;
            --panel-bg: rgba(10, 17, 30, 0.85);
            --neon-blue: #00f0ff;
            --neon-blue-dim: rgba(0, 240, 255, 0.2);
            --danger-red: #ff2a2a;
            --text-main: #e2e8f0;
        }

        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--bg-color);
            /* Animated Cyber Grid Background */
            background-image: 
                linear-gradient(var(--neon-blue-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-blue-dim) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            color: var(--text-main); 
            padding: 2rem; 
            display: flex;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 30px 30px; }
        }

        .card { 
            background: var(--panel-bg); 
            padding: 2rem; 
            border-radius: 12px; 
            border: 1px solid rgba(0, 240, 255, 0.3); 
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
            width: 100%;
            max-width: 650px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        /* Scanning Line Effect */
        .card::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(0, 240, 255, 0.1) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg);
            animation: scanline 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%) rotate(30deg); }
            100% { transform: translateY(100%) rotate(30deg); }
        }

        h2 { 
            color: var(--neon-blue); 
            margin-top: 0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        input { 
            flex-grow: 1;
            padding: 12px 15px; 
            border-radius: 6px; 
            border: 1px solid #334155; 
            background: rgba(0,0,0,0.5); 
            color: var(--neon-blue); 
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue-dim);
        }

        button { 
            padding: 12px 24px; 
            background: transparent; 
            color: var(--neon-blue); 
            border: 1px solid var(--neon-blue);
            border-radius: 6px;
            cursor: pointer; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover { 
            background: var(--neon-blue); 
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
            transform: translateY(-2px);
        }

        /* Loading Pulse Animation */
        .pulse-text {
            animation: pulseText 1.5s ease-in-out infinite;
        }
        @keyframes pulseText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .data-box { 
            background: rgba(0, 0, 0, 0.6); 
            padding: 15px; 
            border-radius: 8px; 
            border-left: 3px solid var(--neon-blue);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .threat-box { border-left-color: var(--danger-red); }

        .highlight-blue { color: var(--neon-blue); font-weight: bold; }
        .highlight-red { color: var(--danger-red); font-weight: bold; text-shadow: 0 0 5px rgba(255, 42, 42, 0.5); }

        #map { 
            height: 350px; 
            width: 100%; 
            border-radius: 8px; 
            margin-top: 20px; 
            display: none; 
            border: 1px solid #334155;
            filter: invert(90%) hue-rotate(180deg) brightness(95%) contrast(85%); /* Dark Mode Map Hack */
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛰️ Phase 7: IP Reputation Engine</h2>
        <p style="font-size: 0.85rem; color: #64748b; margin: 0;">GLOBAL THREAT INTEL // ISOLATED MODULE // PORT: 5005</p>
        
        <div class="input-group">
            <input type="text" id="ipInput" placeholder="Enter target IPv4 (e.g., 8.8.8.8)">
            <button onclick="scanIP()" id="scanBtn">Execute Scan</button>
        </div>

        <div id="results" style="display: none;">
            <div class="data-grid">
                <div class="data-box" id="geoData"></div>
                <div class="data-box threat-box" id="threatData"></div>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script>
        let ipMap = null;
        let mapMarker = null;

        async function scanIP() {
            const ip = document.getElementById('ipInput').value;
            if (!ip) return;

            const btn = document.getElementById('scanBtn');
            btn.innerText = "SCANNING...";
            btn.style.boxShadow = "0 0 20px var(--neon-blue)";

            document.getElementById('results').style.display = 'block';
            document.getElementById('geoData').innerHTML = "<span class='highlight-blue pulse-text'>> TRACING ROUTE...</span>";
            document.getElementById('threatData').innerHTML = "<span class='highlight-red pulse-text'>> QUERYING DATABASES...</span>";
            document.getElementById('map').style.display = 'none';

            try {
                const response = await fetch('http://127.0.0.1:5005/api/check-ip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip: ip })
                });

                const data = await response.json();

                if (data.status === "success") {
                    document.getElementById('geoData').innerHTML = 
                        `<span class="highlight-blue">ISP:</span> ${data.geo.isp || 'UNKNOWN'} <br> 
                         <span class="highlight-blue">LOC:</span> ${data.geo.city || 'UNKNOWN'}, ${data.geo.country || 'UNKNOWN'}`;
                    
                    document.getElementById('threatData').innerHTML = 
                        `<span class="highlight-red">RISK SCORE:</span> ${data.threat_intel.score}% <br>
                         <span class="highlight-red">STATUS:</span> ${data.threat_intel.status}`;

                    // Show and render map
                    document.getElementById('map').style.display = 'block';
                    if (!ipMap) {
                        ipMap = L.map('map').setView([data.geo.lat, data.geo.lon], 10);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(ipMap);
                    } else {
                        ipMap.setView([data.geo.lat, data.geo.lon], 10);
                    }

                    if (mapMarker) ipMap.removeLayer(mapMarker);
                    mapMarker = L.marker([data.geo.lat, data.geo.lon]).addTo(ipMap);
                }
            } catch (err) {
                document.getElementById('geoData').innerHTML = "<span class='highlight-red'>CONNECTION FAILURE. IS PORT 5005 ACTIVE?</span>";
                document.getElementById('threatData').innerHTML = "";
            } finally {
                btn.innerText = "EXECUTE SCAN";
                btn.style.boxShadow = "none";
            }
        }
    </script>
</body>
</html>
